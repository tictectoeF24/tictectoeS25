image: alpine:latest

stages:
  - build_and_check
  - deploy

# ----------------------------------------------------------
# Build and Check Stage (runs on all branches)
# ----------------------------------------------------------
build_and_check_project:
  stage: build_and_check
  image: node:20-alpine
  script:
    - echo "Starting build and check process..."
    - apk add --no-cache git
    # Frontend
    - cd tictectoe-frontend
    - npm ci
    - npm run build
    - npm run lint
    - cd ../tictectoe-backend
    # Backend
    - npm ci
    - npm run build
    - npm run lint
    - npm test || echo "No tests found, skipping..."
  only:
    - branches
  except:
    - tags
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - tictectoe-frontend/node_modules/
      - tictectoe-backend/node_modules/

# ----------------------------------------------------------
# Deployment Stage
# ----------------------------------------------------------
deploy_to_github:
  stage: deploy
  variables:
    GIT_DEPTH: 0
  script:
    - apk add --no-cache git
    - git config --global user.email "tictectoeF24@gmail.com"
    - git config --global user.name "tictectoeF24"
    - git remote remove github || true
    - git remote add github https://tictectoeF24:${GITHUB_TOKEN}@github.com/tictectoeF24/tictectoeS25.git
    - git config --global http.postBuffer 1572864000
    - git fetch origin Develop  
    - git checkout Develop  
    - git reset --hard origin/Develop
    - |
      for i in 1 2 3; do
        git push --force github Develop:refs/heads/main && break
        echo "Retrying push to GitHub..."
        sleep 5
      done
  only:
    - Develop